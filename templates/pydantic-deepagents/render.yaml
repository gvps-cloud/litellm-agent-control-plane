services:
  - type: web
    name: pydantic-deepagents-agent-server
    runtime: docker
    rootDir: templates/pydantic-deepagents
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: PORT
        value: "8080"
      - key: DB_PATH
        value: /var/data/agents.db
      - key: PYDANTIC_DEEP_WORKDIR_ROOT
        value: /var/data/workspaces
      - key: DEFAULT_MODEL
        value: anthropic:claude-sonnet-4-6
      - key: RUNTIME_API_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: LITELLM_BASE_URL
        sync: false
      - key: LITELLM_API_KEY
        sync: false
      - key: LITELLM_MODELS
        sync: false
    disk:
      name: pydantic-deepagents-data
      mountPath: /var/data
      sizeGB: 1
